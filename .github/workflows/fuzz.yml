name: Fuzz

# cargo-fuzz lane on `roundfi-math`. 6 targets matrix-parallel, each
# bounded to 60s on PR. A longer-running scheduled job (weekly, ~30min
# per target) lives at `.github/workflows/fuzz-scheduled.yml`.
#
# Why a separate workflow (not inside `ci.yml`):
#   1. Needs **nightly** toolchain (cargo-fuzz / libfuzzer-sys
#      requirement); the main lanes run on stable.
#   2. `crates/math/fuzz` is intentionally excluded from the workspace
#      so the rest of the build doesn't pull in libfuzzer-sys.
#
# Required lane (flipped 2026-05-14 — was advisory through PRs #286 +
# #288 + #302). Every PR run since introduction has been green across
# all 6 targets; flipping to required means a new fuzz-discovered
# crash blocks the PR instead of warning silently.
#
# Tracked under: issue #284.

on:
  push:
    branches: [main]
    paths:
      - "crates/math/**"
      - ".github/workflows/fuzz.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/math/**"
      - ".github/workflows/fuzz.yml"
  workflow_dispatch:
    inputs:
      duration_per_target:
        description: "Seconds per fuzz target (default 60)"
        required: false
        default: "60"

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  # Per-target time-box. PR runs use 60s; workflow_dispatch can override.
  DURATION_PER_TARGET: ${{ github.event.inputs.duration_per_target || '60' }}

jobs:
  cargo-fuzz:
    name: fuzz · roundfi-math (libfuzzer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      # Each target runs in parallel — failures are isolated per target.
      fail-fast: false
      matrix:
        target: [cascade, waterfall, dc_invariant, escrow_vesting, bps, seed_draw]

    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-fuzz
          workspaces: crates/math/fuzz -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target — ${{ matrix.target }}
        id: fuzz
        working-directory: crates/math/fuzz
        run: |
          mkdir -p artifacts
          # `-max_total_time` bounds the run; `-print_final_stats=1`
          # gives us coverage + executions in the log; `-rss_limit_mb`
          # caps memory so a runaway corpus doesn't OOM the runner.
          # Exit code propagates — required lane fails on any crash.
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=${DURATION_PER_TARGET} \
            -print_final_stats=1 \
            -rss_limit_mb=2048 \
            2>&1 | tee "artifacts/${{ matrix.target }}.log"
          # PIPESTATUS preserves the cargo-fuzz exit even through tee.
          exit "${PIPESTATUS[0]}"

      - name: Upload fuzz logs + crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-${{ matrix.target }}
          path: |
            crates/math/fuzz/artifacts/
            crates/math/fuzz/fuzz/artifacts/
          if-no-files-found: warn
          retention-days: 14
