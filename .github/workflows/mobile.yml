name: mobile

# Standalone lane — typecheck + lint, advisory while the scaffold
# stabilizes. No EAS Build, no emulator, no native compile.
#
# IMPORTANT: mobile/ is NOT a pnpm workspace member and uses **npm**, not
# pnpm. React Native / Metro require a truly flat node_modules; pnpm —
# even with node-linker=hoisted — keeps its .pnpm/ store + partial
# symlinks, so a package's sibling deps (e.g. react-native-get-random-
# values → fast-base64-decode) go unresolved. npm produces real flat
# resolution. So this lane runs `npm ci` inside mobile/ and never touches
# the main pnpm workspace. mobile consumes @roundfi/sdk via file:../sdk.

on:
  pull_request:
    paths:
      - "mobile/**"
      - "sdk/**"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "sdk/**"

jobs:
  mobile-checks:
    name: mobile · typecheck + lint (advisory)
    runs-on: ubuntu-latest
    # Advisory: doesn't block merges yet. Flip to required once a
    # component/test layer lands that catches real regressions.
    continue-on-error: true
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Standalone npm install (committed package-lock.json) — produces
      # the flat node_modules RN/Metro require. NOT pnpm (see header).
      - name: Install (npm, standalone)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
