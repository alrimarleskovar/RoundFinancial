name: mobile

# Standalone lane — typecheck + lint, advisory while the scaffold
# stabilizes. No EAS Build, no emulator, no native compile.
#
# IMPORTANT: mobile/ is NOT a pnpm workspace member (React Native needs
# a flat node_modules; see mobile/.npmrc + ../pnpm-workspace.yaml). So
# this lane installs inside mobile/ with its own flat node_modules and
# does NOT touch the main workspace install. Path-filtered to mobile/ +
# sdk/ (mobile consumes @roundfi/sdk via file:../sdk).

on:
  pull_request:
    paths:
      - "mobile/**"
      - "sdk/**"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "sdk/**"

jobs:
  mobile-checks:
    name: mobile · typecheck + lint (advisory)
    runs-on: ubuntu-latest
    # Advisory: doesn't block merges yet. Flip to required once a
    # component/test layer lands that catches real regressions.
    continue-on-error: true
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Standalone install — mobile/ has node-linker=hoisted in its own
      # .npmrc, so this produces the flat node_modules RN/Metro expect.
      # Not --frozen-lockfile: mobile has no committed lockfile yet
      # (first green run will add mobile/pnpm-lock.yaml or package-lock).
      - name: Install (standalone)
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test
