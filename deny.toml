# cargo-deny configuration — RoundFi
#
# Policy: permissive licences, conservative bans, advisory-only on
# RustSec until the Anza Agave 2.x migration retires the known Solana
# 1.18 transient advisories (already documented in
# `.github/workflows/ci.yml` cargo-audit job).
#
# Run locally:
#   cargo install cargo-deny --locked
#   cargo deny check
#
# Run in CI: see the `deny · supply-chain (advisory)` job in ci.yml.

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# ─── Licenses ────────────────────────────────────────────────────────
# Allow-list. Anything not listed → fail. Project is Apache-2.0; the
# permissive set below covers ~100% of the typical Solana + Anchor +
# Tokio + mpl-core dependency graph without admitting any
# copyleft/proprietary code.
[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",                 # weak-copyleft, file-scope only; common in webpki / lego
  "CC0-1.0",
  "0BSD",
  "Unlicense",
  "OpenSSL",                 # exception clause; needed by ring transitives
]
confidence-threshold = 0.93
exceptions = []

# Explicit per-crate licence overrides (rare — only if a crate's
# Cargo.toml mis-labels its actual licence).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

# Adevar Labs SEV-011 follow-up: mpl-core 0.8.x ships a LICENSE file
# (Apache-2.0) but doesn't declare a `license` field in Cargo.toml.
# cargo-deny's text-fingerprint heuristic gets 0.80 confidence —
# below the 0.93 threshold — so it can't auto-resolve. This clarify
# entry pins the resolution explicitly. Retire when we move to a
# version of mpl-core that declares its license field properly
# (tracked via the Agave 2.x / mpl-core 0.12 upgrade in PR #319).
#
# Version range "0.8" matches both 0.8.0 and 0.8.1 — LICENSE files
# are byte-identical, so the same hash applies. The pin in
# programs/roundfi-core/Cargo.toml (=0.8.0) keeps the resolution
# deterministic; the range here just future-proofs against a patch
# bump within 0.8.x.
[[licenses.clarify]]
name = "mpl-core"
version = "0.8"
expression = "Apache-2.0"
license-files = [
  { path = "LICENSE", hash = 0xd3dacb8e },
]

# ─── Bans ────────────────────────────────────────────────────────────
# Hard bans on crates we deliberately don't want in the tree.
[bans]
multiple-versions = "warn"     # noise, not security — keep as warn
wildcards = "deny"             # no version = "*" in Cargo.toml
# Adevar Labs SEV-011 follow-up: intra-workspace `path = "..."` deps
# (e.g. roundfi-core depending on roundfi-math via `path = "../math"`)
# are treated as "wildcard" by cargo-deny because they don't carry an
# explicit `version`. Allow these — they're not crates.io supply-chain
# risk, they're internal monorepo references. The same flag is the
# canonical solution recommended by the cargo-deny docs for workspace
# repos.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates that should never appear. Empty for now — placeholder for
# future bans (e.g. yanked-only crates discovered during review).
deny = []

# Skip versioning checks for these (allow multiple major versions of
# the same crate to coexist in the graph — common in Solana + Anchor
# stacks because of pinned solana-program 1.18 vs newer Tokio etc.).
skip = []

# Skip-tree applies the rule below to entire dep subtrees, not just
# the named crate. Useful for upstream stacks that vendor their own
# version of a common dep.
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────
# Restrict registries + git-source allow-list. All crates must come
# from crates.io; the one git source we trust is the Anchor
# repository because `anchor build` uses git tags (not crates.io
# publishes) for some Anchor crates during the 0.30.x cycle.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/coral-xyz/anchor",
]

[sources.allow-org]
github = []
gitlab = []
bitbucket = []

# ─── Advisories ──────────────────────────────────────────────────────
# RustSec advisory DB policy. Advisory-only on `vulnerability` until
# the Anza Agave 2.x migration retires the Solana 1.18 transient
# CVEs (curve25519-dalek, ed25519-dalek-bip32, etc.) tracked upstream
# and unfixable from our side. `unmaintained` stays deny because we
# want to know if a crate goes orphan.
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

# Adevar Labs SEV-011 fix: explicit RUSTSEC-IDs for each known Solana
# 1.18 / mpl-core 0.8 transient. Same list as the cargo-audit job in
# .github/workflows/ci.yml — defence in depth, both scanners catch
# anything new that bypasses either's filter. When the Agave 2.x
# migration (#319) lands, this entire block goes away.
ignore = [
  "RUSTSEC-2024-0344",  # curve25519-dalek timing variability (solana-zk-token-sdk 1.18)
  "RUSTSEC-2022-0093",  # ed25519-dalek double-PK signing oracle (solana-sdk 1.18)
  "RUSTSEC-2024-0375",  # atty unmaintained
  "RUSTSEC-2021-0145",  # atty unaligned read
  "RUSTSEC-2025-0141",  # bincode unmaintained (solana SDK)
  "RUSTSEC-2024-0388",  # derivative unmaintained (solana SDK)
  "RUSTSEC-2025-0161",  # libsecp256k1 unmaintained (solana-secp256k1-recover)
  "RUSTSEC-2024-0436",  # paste unmaintained (solana / anchor)
  "RUSTSEC-2024-0370",  # proc-macro-error unmaintained
  "RUSTSEC-2023-0033",  # borsh 0.x ZST unsoundness (mpl-core 0.8 transitive)
  "RUSTSEC-2026-0097",  # rand unsound with custom logger (solana SDK)
]
