# cargo-deny configuration — RoundFi
#
# Policy: permissive licences, conservative bans, advisory-only on
# RustSec until the Anza Agave 2.x migration retires the known Solana
# 1.18 transient advisories (already documented in
# `.github/workflows/ci.yml` cargo-audit job).
#
# Run locally:
#   cargo install cargo-deny --locked
#   cargo deny check
#
# Run in CI: see the `deny · supply-chain (advisory)` job in ci.yml.

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# ─── Licenses ────────────────────────────────────────────────────────
# Allow-list. Anything not listed → fail. Project is Apache-2.0; the
# permissive set below covers ~100% of the typical Solana + Anchor +
# Tokio + mpl-core dependency graph without admitting any
# copyleft/proprietary code.
[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",                 # weak-copyleft, file-scope only; common in webpki / lego
  "CC0-1.0",
  "0BSD",
  "Unlicense",
  "OpenSSL",                 # exception clause; needed by ring transitives
  # mpl-core 0.12 relicensed from Apache-2.0 to Metaplex's custom NFT license
  # (non-SPDX). Reviewed + explicitly accepted for the #487 migration: RoundFi
  # mints position NFTs (the intended use), not a competing NFT product, so the
  # "Competitive Products" clause (§4c) does not apply. Named as a LicenseRef
  # so the acceptance is explicit + auditable (see the mpl-core clarify below).
  "LicenseRef-Metaplex-NFT-OSL-1.0",
]
confidence-threshold = 0.93
exceptions = []

# Explicit per-crate licence overrides (rare — only if a crate's
# Cargo.toml mis-labels its actual licence).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

# mpl-core relicensed from Apache-2.0 (0.8.x) to the "Metaplex(TM) NFT Open
# Source License v1.0" (custom, non-SPDX) by 0.12. Its Cargo.toml declares
# `license = "non-standard"`, which cargo-deny cannot parse → reported as
# unlicensed. Map it to an explicit LicenseRef (allow-listed above) so the
# dependency's real license is named honestly in the audit trail rather than
# mislabelled Apache-2.0. Reviewed + accepted for the #487 Agave 3.x /
# anchor 1.0 / mpl-core 0.12 migration.
[[licenses.clarify]]
name = "mpl-core"
expression = "LicenseRef-Metaplex-NFT-OSL-1.0"
license-files = []

# ─── Bans ────────────────────────────────────────────────────────────
# Hard bans on crates we deliberately don't want in the tree.
[bans]
multiple-versions = "warn"     # noise, not security — keep as warn
wildcards = "deny"             # no version = "*" in Cargo.toml
# Adevar Labs SEV-011 follow-up: intra-workspace `path = "..."` deps
# (e.g. roundfi-core depending on roundfi-math via `path = "../math"`)
# are treated as "wildcard" by cargo-deny because they don't carry an
# explicit `version`. Allow these — they're not crates.io supply-chain
# risk, they're internal monorepo references. The same flag is the
# canonical solution recommended by the cargo-deny docs for workspace
# repos.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates that should never appear. Empty for now — placeholder for
# future bans (e.g. yanked-only crates discovered during review).
deny = []

# Skip versioning checks for these (allow multiple major versions of
# the same crate to coexist in the graph — common in Solana + Anchor
# stacks because of pinned solana-program 1.18 vs newer Tokio etc.).
skip = []

# Skip-tree applies the rule below to entire dep subtrees, not just
# the named crate. Useful for upstream stacks that vendor their own
# version of a common dep.
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────
# Restrict registries. All crates must come from crates.io. Anchor 1.0 is
# published to crates.io, so the 0.30.x-era git-tag source is no longer used
# after the #487 migration and the git allow-list is now empty.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []

# ─── Advisories ──────────────────────────────────────────────────────
# RustSec advisory DB policy. Advisory-only on `vulnerability` until
# the Anza Agave 2.x migration retires the Solana 1.18 transient
# CVEs (curve25519-dalek, ed25519-dalek-bip32, etc.) tracked upstream
# and unfixable from our side. `unmaintained` stays deny because we
# want to know if a crate goes orphan.
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

# Post-migration (#487): the Agave 3.x / anchor 1.0 / mpl-core 0.12 bump
# retired most of the old Solana 1.18 / mpl-core 0.8 transitive advisories.
# Two unmaintained-crate notices remain in the new tree (verified locally
# with `cargo deny check advisories`): bincode (solana 3.x SDK) and paste
# (mpl-core 0.12 → rmp-serde → rmp → paste). Kept in sync with the
# cargo-audit job in .github/workflows/ci.yml.
ignore = [
  "RUSTSEC-2025-0141",  # bincode unmaintained (solana 3.x SDK)
  "RUSTSEC-2024-0436",  # paste unmaintained (mpl-core 0.12 → rmp-serde → rmp → paste)
]
