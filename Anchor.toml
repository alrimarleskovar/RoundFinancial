# `anchor_version` pin matches the workspace `anchor-lang = "0.30.1"`
# dependency in every `programs/*/Cargo.toml`. Without it, devs running
# Anchor CLI 1.x get a version-drift warning and `anchor test` tries to
# spawn `surfpool` (the Anchor 1.x replacement for solana-test-validator)
# which most local installs don't have. Pinning to 0.30.1 keeps `anchor
# test` on the classic solana-test-validator path — same as CI.
#
# `solana_version` deliberately NOT pinned. PR #121 bumped the
# workspace to Anza Agave 2.x (stable channel) for edition2024
# transitive deps; pinning a `solana_version` here would trigger
# `solana-install init <ver>` before every build, which (a) requires
# the user to have the legacy 1.x cached locally, and (b) overwrites
# whatever Agave 2.x they installed for the CI lane. `anchor build`
# uses whichever `solana` is in PATH instead — matches the
# `programs/roundfi-core/Cargo.toml` `mpl-core 0.8` constraint and the
# `.github/workflows/ci.yml` anchor lane.
[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

# Program IDs below are placeholders — run `anchor build && anchor keys sync`
# after the first local build to generate real keypairs under target/deploy/
# and have this file (and every declare_id! macro) rewritten automatically.

# Localnet addresses MUST match `declare_id!` in each
# `programs/*/src/lib.rs` (same as `[programs.devnet]` below — the
# protocol uses ONE set of program IDs across clusters, vendored into
# the source as `declare_id!` macros). Bankrun (`tests/_harness/
# bankrun.ts`) reads this section to decide where to deploy each
# program in the in-memory env; if these are `11111…` placeholders
# (the Anchor template default), bankrun tries to deploy programs at
# the System Program address, the runtime refuses the override, and
# every spec ix targeting roundfi-core fails with "incorrect program
# id for instruction" (the System Program receives the tx instead of
# roundfi-core). Keep these aligned with `[programs.devnet]` + the
# `declare_id!` macros.
[programs.localnet]
roundfi_core         = "8LVrgxKwKwqjcdq7rUUwWY2zPNk8anpo2JsaR9jTQQjw"
roundfi_reputation   = "Hpo174C6JTCfiZ6r8VYVQdKxo3LBHaJmMbkgrEkxe9R2"
roundfi_yield_mock   = "GPTMPgxexhwkhXNovnfrcSsmoWPUhedvKAQfTV2Ef5AQ"
roundfi_yield_kamino = "74izMa4WzLuHvtzDLdNzcyygKe5fYwtD95EiWMuzhFdb"

[programs.devnet]
roundfi_core         = "8LVrgxKwKwqjcdq7rUUwWY2zPNk8anpo2JsaR9jTQQjw"
roundfi_reputation   = "Hpo174C6JTCfiZ6r8VYVQdKxo3LBHaJmMbkgrEkxe9R2"
roundfi_yield_mock   = "GPTMPgxexhwkhXNovnfrcSsmoWPUhedvKAQfTV2Ef5AQ"
roundfi_yield_kamino = "74izMa4WzLuHvtzDLdNzcyygKe5fYwtD95EiWMuzhFdb"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet  = "~/.config/solana/id.json"

[scripts]
# Only *.spec.ts files are test entrypoints; *.ts files under tests/_harness/
# are helpers imported by specs. `anchor test` runs this on localnet after
# building all programs from the workspace. The runner is `mocha + tsx/cjs`
# (configured via `.mocharc.json` at repo root) — the `tsx` ESM/CJS loader
# resolves the `.js` extensions in spec imports back to their `.ts` sources
# without the ts-mocha 10 / ts-node 7 NodeNext limitation that bit specs
# pre-#359.
test = "pnpm exec mocha -t 1000000 'tests/**/*.spec.ts'"

[workspace]
types = "sdk/src/generated"
