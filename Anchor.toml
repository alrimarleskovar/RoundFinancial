# `[toolchain]` block intentionally omitted. PR #121 bumped the
# workspace to Anza Agave 2.x (stable channel) for edition2024
# transitive deps; pinning a `solana_version` here would trigger
# `solana-install init <ver>` before every build, which (a) requires
# the user to have the legacy 1.x cached locally, and (b) overwrites
# whatever Agave 2.x they installed for the CI lane.
#
# `anchor build` now uses whichever `solana` is in PATH, matching the
# `programs/roundfi-core/Cargo.toml` `mpl-core 0.8` constraint and the
# `.github/workflows/ci.yml` anchor lane (which installs Agave stable
# on a fresh ubuntu-latest runner). Same toolchain everywhere.

[features]
resolution = true
skip-lint = false

# Program IDs below are placeholders — run `anchor build && anchor keys sync`
# after the first local build to generate real keypairs under target/deploy/
# and have this file (and every declare_id! macro) rewritten automatically.

[programs.localnet]
roundfi_core        = "11111111111111111111111111111111"
roundfi_reputation  = "11111111111111111111111111111111"
roundfi_yield_mock  = "11111111111111111111111111111111"
roundfi_yield_kamino = "11111111111111111111111111111111"

[programs.devnet]
roundfi_core         = "8LVrgxKwKwqjcdq7rUUwWY2zPNk8anpo2JsaR9jTQQjw"
roundfi_reputation   = "Hpo174C6JTCfiZ6r8VYVQdKxo3LBHaJmMbkgrEkxe9R2"
roundfi_yield_mock   = "GPTMPgxexhwkhXNovnfrcSsmoWPUhedvKAQfTV2Ef5AQ"
roundfi_yield_kamino = "74izMa4WzLuHvtzDLdNzcyygKe5fYwtD95EiWMuzhFdb"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet  = "~/.config/solana/id.json"

[scripts]
# Only *.spec.ts files are test entrypoints; *.ts files under tests/_harness/
# are helpers imported by specs. `anchor test` runs this on localnet after
# building all programs from the workspace. tests/tsconfig.json overrides
# module to CommonJS so ts-mocha can `require()` the workspace @roundfi/sdk.
test = "pnpm exec ts-mocha -p ./tests/tsconfig.json -t 1000000 'tests/**/*.spec.ts'"

[workspace]
types = "sdk/src/generated"
