# `anchor_version` is intentionally NOT pinned. The workspace migrated to
# `anchor-lang = "1.0"` (#487). A stale `anchor_version` pin makes `avm`
# switch the CLI to that version ŌĆö pinning `0.30.1` made local `anchor
# build` run the wrong CLI (which can't build the 1.0 code and lacks
# `--ignore-keys`; surfaced during the devnet redeploy). With no pin,
# `anchor build` uses the installed CLI (1.0.2) ŌĆö same as the `anchor ┬Ę
# build` CI lane. NB: under Anchor 1.x `anchor test` uses `surfpool`, but
# this repo's suite runs via mocha / bankrun / litesvm (see `[scripts]
# test` + ci.yml), not `anchor test`.
#
# `solana_version` deliberately NOT pinned either ŌĆö `anchor build` uses
# whichever `solana` (Agave 3.x) is in PATH, matching the CI anchor lane.
[toolchain]

[features]
resolution = true
skip-lint = false

# Program IDs below are placeholders ŌĆö run `anchor build && anchor keys sync`
# after the first local build to generate real keypairs under target/deploy/
# and have this file (and every declare_id! macro) rewritten automatically.

# Localnet addresses MUST match `declare_id!` in each
# `programs/*/src/lib.rs` (same as `[programs.devnet]` below ŌĆö the
# protocol uses ONE set of program IDs across clusters, vendored into
# the source as `declare_id!` macros). Bankrun (`tests/_harness/
# bankrun.ts`) reads this section to decide where to deploy each
# program in the in-memory env; if these are `11111ŌĆ”` placeholders
# (the Anchor template default), bankrun tries to deploy programs at
# the System Program address, the runtime refuses the override, and
# every spec ix targeting roundfi-core fails with "incorrect program
# id for instruction" (the System Program receives the tx instead of
# roundfi-core). Keep these aligned with `[programs.devnet]` + the
# `declare_id!` macros.
[programs.localnet]
roundfi_core         = "8LVrgxKwKwqjcdq7rUUwWY2zPNk8anpo2JsaR9jTQQjw"
roundfi_reputation   = "Hpo174C6JTCfiZ6r8VYVQdKxo3LBHaJmMbkgrEkxe9R2"
roundfi_yield_mock   = "GPTMPgxexhwkhXNovnfrcSsmoWPUhedvKAQfTV2Ef5AQ"
roundfi_yield_kamino = "74izMa4WzLuHvtzDLdNzcyygKe5fYwtD95EiWMuzhFdb"

[programs.devnet]
roundfi_core         = "8LVrgxKwKwqjcdq7rUUwWY2zPNk8anpo2JsaR9jTQQjw"
roundfi_reputation   = "Hpo174C6JTCfiZ6r8VYVQdKxo3LBHaJmMbkgrEkxe9R2"
roundfi_yield_mock   = "GPTMPgxexhwkhXNovnfrcSsmoWPUhedvKAQfTV2Ef5AQ"
roundfi_yield_kamino = "74izMa4WzLuHvtzDLdNzcyygKe5fYwtD95EiWMuzhFdb"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet  = "~/.config/solana/id.json"

[scripts]
# Only *.spec.ts files are test entrypoints; *.ts files under tests/_harness/
# are helpers imported by specs. `anchor test` runs this on localnet after
# building all programs from the workspace. The runner is `mocha + tsx/cjs`
# (configured via `.mocharc.json` at repo root) ŌĆö the `tsx` ESM/CJS loader
# resolves the `.js` extensions in spec imports back to their `.ts` sources
# without the ts-mocha 10 / ts-node 7 NodeNext limitation that bit specs
# pre-#359.
test = "pnpm exec mocha -t 1000000 'tests/**/*.spec.ts'"

[workspace]
types = "sdk/src/generated"
